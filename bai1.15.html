<body>
	<table border="0" width="80%" align="center" cellpadding="10" cellspacing="0">
		<tr >
			<td width="30%" valign="top">
			<p>Hệ thống chính trị</p>

		</td>
		<td width="70%">

			<form>
				<table>
					<tr>
						<td align="right">Nhập họ tên:</td>
						<td><input type="text" placeholder="Họ tên"> </td>
					</tr>
					<tr>
						<td align="right">Email:</td>
						<td><input type="text" placeholder="Email"> </td>
					</tr>
					<tr>
						<td align="right">Điện thoại:</td>
						<td><input type="tel" placeholder="Điện thoại"> </td>
					</tr>
					<tr>
						<td align="right">Năm sinh:</td>
						<td>
						<select>
						<option>1990</option>
						<option>1991</option>
						<option>1992</option>
						<option selected>1993</option>
						<option>1994</option>
					</select></td>
						      
					</tr>
					<tr>
						<td align="right">Giới tính:</td>
						<td>
							<input type="radio" name="gt" value="nam">Nam

						</td>
					</tr>
					<tr>
						<td align="right">Nội dung:</td>
						<td>
							<textarea rows="5" cols="40" wrap=" 50"></textarea>
						</td>
					</tr>
					<tr>
						<td >
							<input type="submit" value="Gửi câu hỏi" align="right" >
							<input type="reset" value="Nhập lại" align="right">
						</td>
					</tr>
				</table>
			</form>
			
		</td>
			
		</tr>

		
	</table>
